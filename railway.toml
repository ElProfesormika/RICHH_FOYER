# Service unique : API + interface React sur la même URL
# Root Directory = vide (racine repo) — Dockerfile backend/Dockerfile

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"
watchPatterns = ["backend/**", "app_db.sql", "Rapport vente.csv"]

[deploy]
# Liveness sans base de données (évite échec si Postgres démarre après l'API)
healthcheckPath = "/api/health/live"
healthcheckTimeout = 300
startCommand = "sh -c 'uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
restartPolicyType = "ON_FAILURE"
numReplicas = 1
